name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build (warnings-as-errors)
        working-directory: backend
        env:
          Jwt__Secret: ci-jwt-secret-this-is-at-least-thirty-two-bytes-long-padded
        run: dotnet build --no-restore -warnaserror

      - name: Test
        working-directory: backend
        env:
          Jwt__Secret: ci-jwt-secret-this-is-at-least-thirty-two-bytes-long-padded
        run: dotnet test --no-build --verbosity normal

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from `packageManager` in frontend/package.json — single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Build
        working-directory: frontend
        run: pnpm build

  openapi-freshness:
    name: OpenAPI types freshness
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      # pnpm version comes from `packageManager` in frontend/package.json — single source of truth.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build backend (separately, so `dotnet run --no-build` boots fast)
        working-directory: backend
        env:
          Jwt__Secret: ci-jwt-secret-this-is-at-least-thirty-two-bytes-long-padded
        run: dotnet build BookTracker.Api/BookTracker.Api.csproj

      - name: Boot backend and fetch fresh openapi.json
        env:
          Jwt__Secret: ci-jwt-secret-this-is-at-least-thirty-two-bytes-long-padded
        run: |
          dotnet run --project backend/BookTracker.Api --no-build > /tmp/api.log 2>&1 &
          API_PID=$!
          # Up to 60 seconds for the API to start accepting requests.
          for i in {1..60}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Hard fail (not just curl exit 7) if /health never responded, with diagnostics.
          if ! curl -sf http://localhost:5000/health > /dev/null; then
            echo "::error::API never became reachable. Last 30 log lines:"
            tail -30 /tmp/api.log
            kill $API_PID 2>/dev/null || true
            exit 1
          fi
          curl -fsS http://localhost:5000/swagger/v1/swagger.json -o /tmp/openapi.fresh.json
          kill $API_PID 2>/dev/null || true

      - name: Regenerate types from fresh openapi.json and compare
        working-directory: frontend
        run: |
          cp /tmp/openapi.fresh.json ./openapi.json
          pnpm gen:types
          # Fail if either openapi.json or types.ts would change vs. what's committed.
          git diff --exit-code -- openapi.json src/lib/api/types.ts \
            || (echo "::error::OpenAPI types are stale. Run 'pnpm gen:types' locally and commit the result."; exit 1)

  e2e:
    name: E2E (Playwright)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # pnpm version comes from `packageManager` in frontend/package.json — single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Build backend (so webServer config can use --no-build for fast startup)
        working-directory: backend
        env:
          Jwt__Secret: ci-jwt-secret-this-is-at-least-thirty-two-bytes-long-padded
        run: dotnet build BookTracker.Api/BookTracker.Api.csproj

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: "true"
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
